# Weekly sign-up reminder DMs. The raid-time channel announcements live in
# announce.yml (one file per purpose - GitHub misattributes which cron fired
# a run after workflow edits, so nothing here guesses modes from schedules).
#
# Schedule: Friday 5PM Eastern. GitHub cron is UTC and can't follow US
# daylight saving, so BOTH possible UTC times are scheduled and the script
# decides which one is really 5PM Eastern (config.json reminders_send_hour_et,
# checked in remind.py) - the other logs "Skipping reminders" and exits.
#
# Do NOT go back to relying on state.json dedup for this: dedup silences the
# SECOND run, so the EARLIER one always won and the digest drifted to 4PM ET
# every winter without anything looking broken.
#
# Set the two secrets under: Repo -> Settings -> Secrets and variables -> Actions
#   DISCORD_BOT_TOKEN
#   RAIDHELPER_API_KEY
# The "Run workflow" button (Actions tab) triggers a manual run for testing.
# Mode "check" is a read-only permission audit: it reports whether the bot can
# View / Send / Mention-roles in every signup channel plus the officer log
# channel. Run it after ANY channel is recreated, after the bot is replaced,
# and after anyone clicks "Sync Now" on a category - those are the three ways
# the grants have silently died before, each time surfacing at T-60 on a raid
# night instead of somewhere harmless.

name: Send signup reminders

on:
  schedule:
    - cron: "0 21 * * 5"     # reminders: Friday 5PM EDT (summer)
    - cron: "0 22 * * 5"     # reminders: Friday 5PM EST (winter)
  workflow_dispatch:
    inputs:
      mode:
        description: "What to run"
        type: choice
        options: [all, reminders, announcements, check]
        default: all
      dry_run:
        description: "Dry run (print instead of sending)"
        type: boolean
        default: false

permissions:
  contents: write   # allows the workflow to commit state.json back

concurrency:
  group: reminders   # shared with announce.yml - never two runs at once
  cancel-in-progress: false

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run reminder script
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          RAIDHELPER_API_KEY: ${{ secrets.RAIDHELPER_API_KEY }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODE="${{ inputs.mode }}"
            # Manual runs are for testing, so they bypass the 5PM-Eastern gate
            # - otherwise the Run workflow button would do nothing 23 hours a
            # day and look broken.
            EXTRA="--ignore-send-hour"
            [ "${{ inputs.dry_run }}" = "true" ] && EXTRA="$EXTRA --dry-run"
          else
            MODE="reminders"
            EXTRA=""
          fi
          echo "Running mode: $MODE $EXTRA"
          python remind.py --mode "$MODE" $EXTRA

      - name: Save state (so nothing is ever sent twice)
        run: |
          if [ -n "$(git status --porcelain state.json)" ]; then
            git config user.name "reminder-bot"
            git config user.email "actions@users.noreply.github.com"
            git add state.json
            git commit -m "Update reminder state"
            git pull --rebase
            git push
          else
            echo "No state changes."
          fi
